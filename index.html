<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="KAMALA GROUP — Creating Talent. Building Experiences. Agence événementielle, production artistique, management de talents et communication digitale, basée à Abomey-Calavi, Bénin." />
    <meta name="theme-color" content="#1B2E6B" />
    <title>KAMALA GROUP | Creating Talent. Building Experiences.</title>
    <script>
      // Applique le thème AVANT le rendu React pour éviter un flash sombre/clair indésirable.
      // Thème clair par défaut, sauf si l'utilisateur a déjà choisi le sombre.
      (function () {
        try {
          var saved = localStorage.getItem('kg-theme');
          if (saved === 'dark') {
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.add('light');
          }
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
